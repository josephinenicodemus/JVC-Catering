<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- CHARACTER ENCODING -->
    <meta charset="UTF-8" />

    <!-- RESPONSIVE -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />

    <!-- PRIMARY SEO -->
    <title>
      JVC Catering | Tailored Tastes. Warm Moments. Spectacular Impressions.
    </title>

    <meta
      name="description"
      content="JVC Catering by Veronica Nguma — Premium Tanzanian catering services for weddings, corporate events, private celebrations, and luxury gatherings."
    />

    <meta
      name="keywords"
      content="JVC Catering, Tanzania Catering, Wedding Catering Tanzania, Corporate Catering, Luxury Catering, Event Catering, Catering Services Dar es Salaam"
    />

    <meta
      name="author"
      content="JVC Catering"
    />

    <!-- THEME -->
    <meta
      name="theme-color"
      content="#c58a3d"
    />

    <!-- ROBOTS -->
    <meta
      name="robots"
      content="index, follow"
    />

    <!-- CANONICAL -->
    <link
      rel="canonical"
      href="https://jvccatering.co.tz/"
    />

    <!-- FAVICON -->
    <link
      rel="icon"
      type="image/png"
      href="/favicon.png"
    />

    <link
      rel="apple-touch-icon"
      href="/favicon.png"
    />

    <!-- OPEN GRAPH -->
    <meta
      property="og:title"
      content="JVC Catering | Tailored Tastes. Warm Moments. Spectacular Impressions."
    />

    <meta
      property="og:description"
      content="Premium Tanzanian catering services for weddings, corporate events, and unforgettable celebrations."
    />

    <meta
      property="og:type"
      content="website"
    />

    <meta
      property="og:url"
      content="https://jvccatering.co.tz/"
    />

    <meta
      property="og:site_name"
      content="JVC Catering"
    />

    <!-- PERFORMANCE -->

    <!-- DNS PREFETCH -->
    <link
      rel="dns-prefetch"
      href="//fonts.googleapis.com"
    />

    <link
      rel="dns-prefetch"
      href="//fonts.gstatic.com"
    />

    <link
      rel="dns-prefetch"
      href="//images.unsplash.com"
    />

    <!-- PRECONNECT -->
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />

    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />

    <link
      rel="preconnect"
      href="https://images.unsplash.com"
      crossorigin
    />

    <!-- HERO IMAGE PRELOAD -->

    <link
      rel="preload"
      as="image"
      href="https://images.unsplash.com/photo-1555244162-803834f70033?w=1600&auto=format&fit=crop&q=78"
      fetchpriority="high"
    />

    <!-- FONTS -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <!-- NOSCRIPT FALLBACK -->
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,600;1,700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- MOBILE PERFORMANCE -->
    <meta
      name="mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-capable"
      content="yes"
    />

    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />

    <!-- RENDERING -->
    <meta
      http-equiv="X-UA-Compatible"
      content="IE=edge"
    />

    <!-- PERFORMANCE HINT -->
    <meta
      http-equiv="Accept-CH"
      content="DPR, Width, Viewport-Width"
    />
  </head>

  <body>
    <div id="root"></div>

    <script
      type="module"
      src="/src/main.jsx"
    ></script>
  </body>
</html>
